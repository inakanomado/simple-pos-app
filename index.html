<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>簡易POS</title>

	<link rel="stylesheet" href="style.css?v=4">
</head>

<body>
	<div class="app">
		<h1>簡易POS</h1>

		<button id="scanBtn">スキャン開始</button>

		<video id="video" autoplay muted playsinline></video>

		<p id="status">未読み取り</p>

		<section id="productArea" class="box">
			<p>商品を読み取ってください</p>
		</section>

		<section id="cartArea" class="box">
			<h2>カート</h2>
			<p>まだ商品はありません</p>
		</section>
	</div>

	<script src="https://unpkg.com/@zxing/browser@latest"></script>
	<script src="app.js?v=4"></script>
</body>

</html>
